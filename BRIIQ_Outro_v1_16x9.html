<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIIQ Outro 16:9</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 100%;
  height: 100%;
}
body {
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Syne', sans-serif;
  overflow: hidden;
}

/* 16:9 video container */
.reel {
  width: 1920px;
  height: 1080px;
  background: #000;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.reel::before {
  content: '';
  position: absolute;
  width: 1200px; height: 1200px;
  background: radial-gradient(circle, rgba(26,92,255,0.10) 0%, transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none;
}

canvas {
  position: absolute;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  opacity: 0;
  animation: fadeIn 1.2s ease 0.3s forwards;
}

.logo-wrap {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 10;
  opacity: 0;
  animation: logoIn 0.8s ease 1.2s forwards;
}

.logo-main {
  font-size: 140px;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: #F2F2F2;
  line-height: 1;
  margin-bottom: 14px;
  text-shadow: 0 0 60px rgba(26,92,255,0.4);
}
.logo-main em {
  font-style: normal;
  color: #1A5CFF;
}
.logo-sub {
  font-family: 'DM Mono', monospace;
  font-size: 24px;
  letter-spacing: 0.34em;
  color: rgba(77,127,255,0.85);
  text-transform: uppercase;
}

.cta-wrap {
  position: absolute;
  bottom: 110px;
  left: 0; right: 0;
  text-align: center;
  z-index: 10;
  opacity: 0;
  animation: ctaIn 0.8s ease 1.8s forwards;
}
.cta-line {
  font-family: 'DM Mono', monospace;
  font-size: 22px;
  letter-spacing: 0.24em;
  color: rgba(242,242,242,0.52);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.cta-main {
  font-size: 34px;
  font-weight: 700;
  color: #F2F2F2;
  letter-spacing: -0.01em;
}
.cta-handle {
  font-size: 28px;
  font-weight: 600;
  color: #1A5CFF;
  margin-top: 10px;
  letter-spacing: 0.02em;
}

.scanlines {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.025) 3px,
    rgba(0,0,0,0.025) 6px
  );
  pointer-events: none;
  z-index: 5;
}

.border-tl, .border-tr, .border-bl, .border-br {
  position: absolute;
  width: 48px; height: 48px;
  z-index: 20;
  opacity: 0;
  animation: fadeIn 0.6s ease 2.2s forwards;
}
.border-tl { top:40px; left:40px; border-top:1px solid rgba(26,92,255,0.4); border-left:1px solid rgba(26,92,255,0.4); }
.border-tr { top:40px; right:40px; border-top:1px solid rgba(26,92,255,0.4); border-right:1px solid rgba(26,92,255,0.4); }
.border-bl { bottom:40px; left:40px; border-bottom:1px solid rgba(26,92,255,0.4); border-left:1px solid rgba(26,92,255,0.4); }
.border-br { bottom:40px; right:40px; border-bottom:1px solid rgba(26,92,255,0.4); border-right:1px solid rgba(26,92,255,0.4); }

.data-label {
  position: absolute;
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  letter-spacing: 0.18em;
  color: rgba(26,92,255,0.35);
  text-transform: uppercase;
  z-index: 15;
  opacity: 0;
  animation: fadeIn 0.6s ease 2.4s forwards;
}
.dl-tl { top:92px; left:56px; }
.dl-tr { top:92px; right:56px; text-align:right; }
.dl-bl { bottom:92px; left:56px; }
.dl-br { bottom:92px; right:56px; text-align:right; }

@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes logoIn {
  from { opacity:0; transform:translate(-50%, calc(-50% + 18px)); }
  to   { opacity:1; transform:translate(-50%,-50%); }
}
@keyframes ctaIn {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>
<div class="reel" id="reel">
  <canvas id="globe" width="760" height="760"></canvas>

  <div class="logo-wrap">
    <div class="logo-main">BRI<em>IQ</em></div>
    <div class="logo-sub">Market Intelligence</div>
  </div>

  <div class="cta-wrap">
    <div class="cta-line">Follow for Daily Insights</div>
    <div class="cta-main">팔로우하고 매일 새로운 소식을 받아보세요</div>
    <div class="cta-handle">@briiq</div>
  </div>

  <div class="scanlines"></div>

  <div class="border-tl"></div>
  <div class="border-tr"></div>
  <div class="border-bl"></div>
  <div class="border-br"></div>

  <div class="data-label dl-tl">LAT 37.5°N</div>
  <div class="data-label dl-tr">LON 127.0°E</div>
  <div class="data-label dl-bl">BRIIQ-SYS-v1</div>
  <div class="data-label dl-br">2026.03.09</div>
</div>

<script>
const canvas = document.getElementById('globe');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W/2, cy = H/2;
const R  = 280;

let rot  = 0;
let spinning = true;

function project(lat, lon, tilt=0.3) {
  const phi   = (90 - lat) * Math.PI / 180;
  const theta = (lon + rot * 180 / Math.PI) * Math.PI / 180;

  const x3 = R * Math.sin(phi) * Math.cos(theta);
  const y3 = R * Math.cos(phi);
  const z3 = R * Math.sin(phi) * Math.sin(theta);

  const y2 = y3 * Math.cos(tilt) - z3 * Math.sin(tilt);
  const z2 = y3 * Math.sin(tilt) + z3 * Math.cos(tilt);

  return { x: cx + x3, y: cy - y2, z: z2, visible: z2 > 0 };
}

function drawGlobe() {
  ctx.clearRect(0, 0, W, H);

  const latLines = [-60,-45,-30,-15,0,15,30,45,60];
  const lonLines = Array.from({length:24}, (_,i) => i*15 - 180);

  latLines.forEach(lat => {
    ctx.beginPath();
    let first = true;
    for (let lon = -180; lon <= 180; lon += 2) {
      const p = project(lat, lon);
      if (!p.visible) { first = true; continue; }
      if (first) { ctx.moveTo(p.x, p.y); first = false; }
      else ctx.lineTo(p.x, p.y);
    }
    const isEquator = lat === 0;
    ctx.strokeStyle = isEquator ? `rgba(26,92,255,0.5)` : `rgba(26,92,255,0.18)`;
    ctx.lineWidth = isEquator ? 1.6 : 1;
    ctx.stroke();
  });

  lonLines.forEach(lon => {
    ctx.beginPath();
    let first = true;
    for (let lat = -90; lat <= 90; lat += 2) {
      const p = project(lat, lon);
      if (!p.visible) { first = true; continue; }
      if (first) { ctx.moveTo(p.x, p.y); first = false; }
      else ctx.lineTo(p.x, p.y);
    }
    ctx.strokeStyle = `rgba(26,92,255,0.15)`;
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  const grd = ctx.createRadialGradient(cx, cy, R-20, cx, cy, R+10);
  grd.addColorStop(0, 'rgba(26,92,255,0.25)');
  grd.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.strokeStyle = grd;
  ctx.lineWidth = 6;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(26,92,255,0.4)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  const points = [
    {lat:37.5, lon:127},
    {lat:35.7, lon:139.7},
    {lat:40.7, lon:-74},
    {lat:51.5, lon:-0.1},
    {lat:1.3,  lon:103.8},
    {lat:22.3, lon:114.2},
    {lat:48.9, lon:2.3},
    {lat:-33.9,lon:151.2},
  ];

  points.forEach(pt => {
    const p = project(pt.lat, pt.lon);
    if (!p.visible) return;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(26,92,255,0.3)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4.5, 0, Math.PI*2);
    ctx.fillStyle = '#1A5CFF';
    ctx.fill();
  });

  const innerGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
  innerGrd.addColorStop(0, 'transparent');
  innerGrd.addColorStop(0.7, 'transparent');
  innerGrd.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.fillStyle = innerGrd;
  ctx.fill();
}

function animate() {
  if (spinning) rot += 0.004;
  drawGlobe();
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
