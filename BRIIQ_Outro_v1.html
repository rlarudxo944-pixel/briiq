<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIIQ Outro</title>
<style>
* { margin:0; padding:0; box-esizing:border-box; }

body {
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Syne', sans-serif;
  overflow: hidden;
}

/* 9:16 릴스 컨테이너 */
.reel {
  width: 390px;
  height: 692px;
  background: #000;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* 배경 그라디언트 glow */
.reel::before {
  content: '';
  position: absolute;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(26,92,255,0.08) 0%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

/* ── CANVAS (globe) ── */
canvas {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  animation: fadeIn 1.2s ease 0.3s forwards;
}

/* ── LOGO ── */
.logo-wrap {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 10;
  opacity: 0;
  animation: fadeInUp 0.8s ease 1.2s forwards;
}

.logo-main {
  font-size: 56px;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: #F2F2F2;
  line-height: 1;
  margin-bottom: 6px;
  text-shadow: 0 0 40px rgba(26,92,255,0.4);
}

.logo-main em {
  font-style: normal;
  color: #1A5CFF;
}

.logo-sub {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.3em;
  color: rgba(77,127,255,0.8);
  text-transform: uppercase;
}

/* ── CTA ── */
.cta-wrap {
  position: absolute;
  bottom: 72px;
  left: 0; right: 0;
  text-align: center;
  z-index: 10;
  opacity: 0;
  animation: fadeInUp 0.8s ease 1.8s forwards;
}

.cta-line {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.22em;
  color: rgba(242,242,242,0.5);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.cta-main {
  font-size: 16px;
  font-weight: 700;
  color: #F2F2F2;
  letter-spacing: -0.01em;
}

.cta-handle {
  font-size: 14px;
  font-weight: 600;
  color: #1A5CFF;
  margin-top: 4px;
  letter-spacing: 0.02em;
}

/* ── 스캔라인 효과 ── */
.scanlines {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 5;
}

/* ── 테두리 ── */
.border-tl, .border-tr, .border-bl, .border-br {
  position: absolute;
  width: 24px; height: 24px;
  z-index: 20;
  opacity: 0;
  animation: fadeIn 0.6s ease 2.2s forwards;
}
.border-tl { top:20px; left:20px; border-top:1px solid rgba(26,92,255,0.4); border-left:1px solid rgba(26,92,255,0.4); }
.border-tr { top:20px; right:20px; border-top:1px solid rgba(26,92,255,0.4); border-right:1px solid rgba(26,92,255,0.4); }
.border-bl { bottom:20px; left:20px; border-bottom:1px solid rgba(26,92,255,0.4); border-left:1px solid rgba(26,92,255,0.4); }
.border-br { bottom:20px; right:20px; border-bottom:1px solid rgba(26,92,255,0.4); border-right:1px solid rgba(26,92,255,0.4); }

/* ── 데이터 라벨 ── */
.data-label {
  position: absolute;
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.18em;
  color: rgba(26,92,255,0.35);
  text-transform: uppercase;
  z-index: 15;
  opacity: 0;
  animation: fadeIn 0.6s ease 2.4s forwards;
}
.dl-tl { top:52px; left:28px; }
.dl-tr { top:52px; right:28px; text-align:right; }
.dl-bl { bottom:52px; left:28px; }
.dl-br { bottom:52px; right:28px; text-align:right; }

/* ── ANIMATIONS ── */
@keyframes fadeIn {
  from { opacity:0; }
  to   { opacity:1; }
}

@keyframes fadeInUp {
  from { opacity:0; transform:translate(-50%,calc(-50% + 12px)); }
  to   { opacity:1; transform:translate(-50%,-50%); }
}

/* logo-wrap은 absolute이므로 fadeInUp 따로 */
.logo-wrap {
  animation: logoIn 0.8s ease 1.2s forwards;
}
@keyframes logoIn {
  from { opacity:0; transform:translate(-50%, calc(-50% + 12px)); }
  to   { opacity:1; transform:translate(-50%,-50%); }
}

.cta-wrap {
  animation: ctaIn 0.8s ease 1.8s forwards;
}
@keyframes ctaIn {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── OUTER CONTROLS ── */
.controls {
  position: fixed;
  bottom: 32px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 12px;
  z-index: 100;
}

.btn {
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 10px 20px;
  border: 1px solid rgba(26,92,255,0.3);
  background: rgba(0,0,0,0.8);
  color: #4D7FFF;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { background: #1A5CFF; color: #fff; border-color: #1A5CFF; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>

<div class="reel" id="reel">
  <canvas id="globe" width="360" height="360"></canvas>

  <div class="logo-wrap">
    <div class="logo-main">BRI<em>IQ</em></div>
    <div class="logo-sub">Market Intelligence</div>
  </div>

  <div class="cta-wrap">
    <div class="cta-line">Follow for Daily Insights</div>
    <div class="cta-main">팔로우하고 매일 새로운 소식을 받아보세요</div>
    <div class="cta-handle">@briiq</div>
  </div>

  <div class="scanlines"></div>

  <div class="border-tl"></div>
  <div class="border-tr"></div>
  <div class="border-bl"></div>
  <div class="border-br"></div>

  <div class="data-label dl-tl">LAT 37.5°N</div>
  <div class="data-label dl-tr">LON 127.0°E</div>
  <div class="data-label dl-bl">BRIIQ-SYS-v1</div>
  <div class="data-label dl-br">2026.03.09</div>
</div>

<div class="controls">
  <button class="btn" onclick="replay()">↺ Replay</button>
  <button class="btn" onclick="toggleSpin()">⏸ Pause</button>
</div>

<script>
const canvas = document.getElementById('globe');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W/2, cy = H/2;
const R  = 140;

let rot  = 0;
let spinning = true;
let raf;

// 위도/경도 → 3D → 2D 투영
function project(lat, lon, tilt=0.3) {
  const phi   = (90 - lat) * Math.PI / 180;
  const theta = (lon + rot * 180 / Math.PI) * Math.PI / 180;

  const x3 = R * Math.sin(phi) * Math.cos(theta);
  const y3 = R * Math.cos(phi);
  const z3 = R * Math.sin(phi) * Math.sin(theta);

  // 약간의 기울기 (y축)
  const y2 = y3 * Math.cos(tilt) - z3 * Math.sin(tilt);
  const z2 = y3 * Math.sin(tilt) + z3 * Math.cos(tilt);

  return { x: cx + x3, y: cy - y2, z: z2, visible: z2 > 0 };
}

function drawGlobe() {
  ctx.clearRect(0, 0, W, H);

  const BLUE     = '#1A5CFF';
  const BLUE2    = '#4D7FFF';
  const BLUE_DIM = 'rgba(26,92,255,0.15)';

  // 위도선 (경위선 그리드)
  const latLines = [-60,-45,-30,-15,0,15,30,45,60];
  const lonLines = Array.from({length:24}, (_,i) => i*15 - 180);

  // 위도선
  latLines.forEach(lat => {
    ctx.beginPath();
    let first = true;
    for (let lon = -180; lon <= 180; lon += 2) {
      const p = project(lat, lon);
      const alpha = p.visible ? (lat===0 ? 0.5 : 0.2) : 0;
      if (alpha === 0) { first = true; continue; }
      if (first) { ctx.moveTo(p.x, p.y); first = false; }
      else ctx.lineTo(p.x, p.y);
    }
    const isEquator = lat === 0;
    ctx.strokeStyle = isEquator ? `rgba(26,92,255,0.5)` : `rgba(26,92,255,0.18)`;
    ctx.lineWidth = isEquator ? 1 : 0.6;
    ctx.stroke();
  });

  // 경도선
  lonLines.forEach(lon => {
    ctx.beginPath();
    let first = true;
    for (let lat = -90; lat <= 90; lat += 2) {
      const p = project(lat, lon);
      if (!p.visible) { first = true; continue; }
      if (first) { ctx.moveTo(p.x, p.y); first = false; }
      else ctx.lineTo(p.x, p.y);
    }
    ctx.strokeStyle = `rgba(26,92,255,0.15)`;
    ctx.lineWidth = 0.6;
    ctx.stroke();
  });

  // 바깥 원 (글로우)
  const grd = ctx.createRadialGradient(cx, cy, R-10, cx, cy, R+4);
  grd.addColorStop(0, 'rgba(26,92,255,0.25)');
  grd.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.strokeStyle = grd;
  ctx.lineWidth = 3;
  ctx.stroke();

  // 외곽 원
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(26,92,255,0.4)';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // 데이터 포인트 (주요 도시 위치)
  const points = [
    {lat:37.5, lon:127},   // 서울
    {lat:35.7, lon:139.7}, // 도쿄
    {lat:40.7, lon:-74},   // 뉴욕
    {lat:51.5, lon:-0.1},  // 런던
    {lat:1.3,  lon:103.8}, // 싱가포르
    {lat:22.3, lon:114.2}, // 홍콩
    {lat:48.9, lon:2.3},   // 파리
    {lat:-33.9,lon:151.2}, // 시드니
  ];

  points.forEach(pt => {
    const p = project(pt.lat, pt.lon);
    if (!p.visible) return;
    // pulse ring
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(26,92,255,0.3)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    // dot
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2);
    ctx.fillStyle = '#1A5CFF';
    ctx.fill();
  });

  // 중앙 글로우 오버레이
  const innerGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
  innerGrd.addColorStop(0, 'transparent');
  innerGrd.addColorStop(0.7, 'transparent');
  innerGrd.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.fillStyle = innerGrd;
  ctx.fill();
}

function animate() {
  if (spinning) rot += 0.004;
  drawGlobe();
  raf = requestAnimationFrame(animate);
}

function replay() {
  const reel = document.getElementById('reel');
  reel.style.animation = 'none';
  reel.querySelectorAll('[style*="animation"], canvas, .logo-wrap, .cta-wrap, .border-tl, .border-tr, .border-bl, .border-br, .data-label').forEach(el => {
    el.style.animation = 'none';
    el.style.opacity = '0';
  });
  void reel.offsetWidth;
  setTimeout(() => {
    canvas.style.animation = 'fadeIn 1.2s ease 0.3s forwards';
    document.querySelector('.logo-wrap').style.animation = 'logoIn 0.8s ease 1.2s forwards';
    document.querySelector('.cta-wrap').style.animation = 'ctaIn 0.8s ease 1.8s forwards';
    document.querySelectorAll('.border-tl,.border-tr,.border-bl,.border-br').forEach(el => {
      el.style.animation = 'fadeIn 0.6s ease 2.2s forwards';
    });
    document.querySelectorAll('.data-label').forEach(el => {
      el.style.animation = 'fadeIn 0.6s ease 2.4s forwards';
    });
  }, 50);
}

function toggleSpin() {
  spinning = !spinning;
  document.querySelector('.controls .btn:last-child').textContent = spinning ? '⏸ Pause' : '▶ Play';
}

animate();
</script>
</body>
</html>
